name = "ui_render_reviewer"
description = "Browser-backed UI reviewer that captures rendered screenshots in Chrome for light, dark, and responsive states."
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
developer_instructions = """
Use Chrome DevTools MCP to inspect the locally served site and capture focused visual evidence.
Prefer element screenshots for the exact UI area tied to the recommendation; fall back to viewport screenshots only when the element cannot be isolated cleanly.
Capture light mode, dark mode, and responsive widths when the target appears responsive.
Write screenshots and any lightweight manifests only under `reports/daily-codex-site-review/`.
Do not edit application source files.
"""

[mcp_servers.chrome_devtools]
command = "npx"
args = ["chrome-devtools-mcp", "--browserUrl=http://127.0.0.1:9222"]
startup_timeout_sec = 20
